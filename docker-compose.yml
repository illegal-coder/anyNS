services:
  anyns-config-init:
    build: .
    image: anyns/control-plane:dev
    container_name: anyns-config-init
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        if [ ! -f /etc/anyns/config.json ]; then
          cp /usr/share/anyns/config.default.json /etc/anyns/config.json
        fi
        chown -R 10001:10001 /etc/anyns
    volumes:
      - anyns-config:/etc/anyns
    restart: "no"

  pdns-recursor:
    build:
      context: ./configs/pdns-recursor
    image: anyns/pdns-recursor:5.4.2
    container_name: anyns-pdns-recursor
    env_file: .env
    command:
      - "--config-dir=/etc/powerdns"
      - "--webserver=yes"
      - "--webserver-address=0.0.0.0"
      - "--webserver-port=8082"
      - "--webserver-allow-from=127.0.0.1/32,172.16.0.0/12"
      - "--api-key=${PDNS_RECURSOR_API_KEY}"
    ports:
      - "${ANYNS_BIND_ADDRESS:-127.0.0.1}:${PDNS_RECURSOR_LOCAL_PORT:-53}:53/udp"
      - "${ANYNS_BIND_ADDRESS:-127.0.0.1}:${PDNS_RECURSOR_LOCAL_PORT:-53}:53/tcp"
      - "${ANYNS_BIND_ADDRESS:-127.0.0.1}:8084:8082/tcp"
    volumes:
      - ./configs/pdns-recursor/recursor.yml:/etc/powerdns/recursor.yml:ro
      - ./configs/pdns-recursor/recursor.lua:/etc/powerdns/recursor.lua:ro
      - anyns-recursor-cache:/var/lib/powerdns
    depends_on:
      pdns-authoritative:
        condition: service_healthy
      anyns-plugin-runtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  pdns-authoritative-init:
    image: powerdns/pdns-auth-50:5.0.5
    container_name: anyns-pdns-authoritative-init
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        database=/var/lib/powerdns/pdns.sqlite3
        if ! sqlite3 "$$database" "SELECT name FROM sqlite_master WHERE type='table' AND name='domains'" | grep -qx domains; then
          sqlite3 "$$database" < /usr/local/share/doc/pdns/schema.sqlite3.sql
        fi
        if ! sqlite3 "$$database" "SELECT name FROM domains WHERE name='anyns.test' LIMIT 1" | grep -qx anyns.test; then
          pdnsutil --config-dir=/etc/powerdns zone load anyns.test. /seed/anyns.test.zone
        fi
        chown -R pdns:pdns /var/lib/powerdns
    volumes:
      - ./configs/pdns-authoritative/pdns.conf:/etc/powerdns/pdns.conf:ro
      - ./configs/pdns-authoritative/zones/anyns.test.zone:/seed/anyns.test.zone:ro
      - anyns-auth-data:/var/lib/powerdns
    restart: "no"

  pdns-authoritative:
    image: powerdns/pdns-auth-50:5.0.5
    container_name: anyns-pdns-authoritative
    env_file: .env
    depends_on:
      pdns-authoritative-init:
        condition: service_completed_successfully
    command:
      - "--config-dir=/etc/powerdns"
      - "--api-key=${PDNS_AUTH_API_KEY}"
      - "--webserver-password=${PDNS_AUTH_WEBSERVER_PASSWORD}"
      - "--webserver-allow-from=127.0.0.1/32,172.16.0.0/12"
    ports:
      - "${ANYNS_BIND_ADDRESS:-127.0.0.1}:5300:5300/udp"
      - "${ANYNS_BIND_ADDRESS:-127.0.0.1}:5300:5300/tcp"
      - "${ANYNS_BIND_ADDRESS:-127.0.0.1}:8083:8081/tcp"
    volumes:
      - ./configs/pdns-authoritative/pdns.conf:/etc/powerdns/pdns.conf:ro
      - anyns-auth-data:/var/lib/powerdns
    healthcheck:
      test: ["CMD-SHELL", "pdns_control uptime >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  anyns-plugin-runtime:
    image: anyns/control-plane:dev
    container_name: anyns-plugin-runtime
    env_file: .env
    entrypoint: ["/usr/local/bin/anyns-plugin-runtime"]
    ports:
      - "${ANYNS_BIND_ADDRESS:-127.0.0.1}:8081:8081"
    volumes:
      - anyns-config:/etc/anyns
      - anyns-runtime-data:/var/lib/anyns
    depends_on:
      anyns-config-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  anyns-admin-api:
    image: anyns/control-plane:dev
    container_name: anyns-admin-api
    env_file: .env
    environment:
      ANYNS_PDNS_AUTH_URL: http://pdns-authoritative:8081
      ANYNS_PDNS_RECURSOR_URL: http://pdns-recursor:8082
      ANYNS_PDNS_SERVER_ID: localhost
    entrypoint: ["/usr/local/bin/anyns-admin-api"]
    ports:
      - "${ANYNS_BIND_ADDRESS:-127.0.0.1}:8080:8080"
    volumes:
      - anyns-config:/etc/anyns
      - anyns-admin-data:/var/lib/anyns
    depends_on:
      anyns-config-init:
        condition: service_completed_successfully
      anyns-plugin-runtime:
        condition: service_healthy
      pdns-authoritative:
        condition: service_healthy
      pdns-recursor:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  anyns-log-forwarder:
    image: anyns/control-plane:dev
    container_name: anyns-log-forwarder
    env_file: .env
    entrypoint: ["/usr/local/bin/anyns-log-forwarder"]
    ports:
      - "${ANYNS_BIND_ADDRESS:-127.0.0.1}:8082:8082"
    volumes:
      - anyns-config:/etc/anyns
      - anyns-log-queue:/var/lib/anyns
    depends_on:
      anyns-config-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  coredns-security:
    image: coredns/coredns:1.11.3
    container_name: anyns-coredns-security
    profiles: ["coredns-security"]
    command: ["-conf", "/etc/coredns/Corefile"]
    ports:
      - "${ANYNS_BIND_ADDRESS:-127.0.0.1}:5353:5353/udp"
      - "${ANYNS_BIND_ADDRESS:-127.0.0.1}:5353:5353/tcp"
    volumes:
      - ./configs/coredns:/etc/coredns:ro

volumes:
  anyns-config:
  anyns-recursor-cache:
  anyns-auth-data:
  anyns-runtime-data:
  anyns-admin-data:
  anyns-log-queue:
