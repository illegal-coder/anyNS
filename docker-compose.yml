services:
  pdns-recursor:
    build:
      context: ./configs/pdns-recursor
    image: anyns/pdns-recursor:5.4.2
    container_name: anyns-pdns-recursor
    env_file: .env
    command: ["--config-dir=/etc/powerdns"]
    ports:
      - "${PDNS_RECURSOR_LOCAL_PORT:-53}:53/udp"
      - "${PDNS_RECURSOR_LOCAL_PORT:-53}:53/tcp"
    volumes:
      - ./configs/pdns-recursor:/etc/powerdns:ro
      - anyns-recursor-cache:/var/lib/powerdns
    depends_on:
      - pdns-authoritative
      - anyns-plugin-runtime
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  pdns-authoritative:
    image: powerdns/pdns-auth-50:5.0.5
    container_name: anyns-pdns-authoritative
    env_file: .env
    command: ["--config-dir=/etc/powerdns"]
    ports:
      - "5300:5300/udp"
      - "5300:5300/tcp"
      - "8083:8081/tcp"
    volumes:
      - ./configs/pdns-authoritative:/etc/powerdns:ro
      - anyns-auth-data:/var/lib/powerdns
    healthcheck:
      test: ["CMD-SHELL", "pdns_control ping || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  anyns-plugin-runtime:
    build: .
    container_name: anyns-plugin-runtime
    env_file: .env
    entrypoint: ["/usr/local/bin/anyns-plugin-runtime"]
    ports:
      - "8081:8081"
    volumes:
      - ./configs/anyns/config.example.json:/etc/anyns/config.json:ro
      - anyns-runtime-data:/var/lib/anyns
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  anyns-admin-api:
    build: .
    container_name: anyns-admin-api
    env_file: .env
    entrypoint: ["/usr/local/bin/anyns-admin-api"]
    ports:
      - "8080:8080"
    volumes:
      - ./configs/anyns/config.example.json:/etc/anyns/config.json:ro
      - anyns-admin-data:/var/lib/anyns
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  anyns-log-forwarder:
    build: .
    container_name: anyns-log-forwarder
    env_file: .env
    entrypoint: ["/usr/local/bin/anyns-log-forwarder"]
    ports:
      - "8082:8082"
    volumes:
      - ./configs/anyns/config.example.json:/etc/anyns/config.json:ro
      - anyns-log-queue:/var/lib/anyns
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  coredns-security:
    image: coredns/coredns:1.11.3
    container_name: anyns-coredns-security
    profiles: ["coredns-security"]
    command: ["-conf", "/etc/coredns/Corefile"]
    ports:
      - "5353:5353/udp"
      - "5353:5353/tcp"
    volumes:
      - ./configs/coredns:/etc/coredns:ro

volumes:
  anyns-recursor-cache:
  anyns-auth-data:
  anyns-runtime-data:
  anyns-admin-data:
  anyns-log-queue:
