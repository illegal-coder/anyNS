tls anyns-test-tls {
  key-file "/etc/bind/certs/server.key";
  cert-file "/etc/bind/certs/server.crt";
};

options {
  directory "/var/cache/bind";

  recursion yes;
  allow-query { any; };
  allow-recursion { any; };
  listen-on port 53 { any; };
  listen-on port 853 tls anyns-test-tls { any; };
  listen-on port 443 tls anyns-test-tls http default { any; };
  listen-on-v6 { none; };

  forward only;
  forwarders {
    pdns-recursor port 53;
  };

  dnssec-validation no;
};

logging {
  channel stderr_log {
    stderr;
    severity info;
    print-time yes;
    print-category yes;
    print-severity yes;
  };
  category default { stderr_log; };
};
