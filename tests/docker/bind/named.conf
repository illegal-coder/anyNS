options {
  directory "/var/cache/bind";

  recursion yes;
  allow-query { any; };
  allow-recursion { any; };
  listen-on port 53 { any; };
  listen-on-v6 { none; };

  forward only;
  forwarders {
    pdns-recursor port 53;
  };

  dnssec-validation no;
};

logging {
  channel stderr_log {
    stderr;
    severity info;
    print-time yes;
    print-category yes;
    print-severity yes;
  };
  category default { stderr_log; };
};
