name: anyns-hnsd-integration

services:
  bind-certgen:
    build:
      context: ./certgen
    image: anyns/bind-certgen:hnsd-integration
    volumes:
      - bind-test-certs:/certs
    networks:
      - dnsnet

  anyns-plugin-runtime:
    build:
      context: ../..
    image: anyns/runtime:integration
    environment:
      ANYNS_CONFIG_FILE: /etc/anyns/config.json
      ANYNS_RUNTIME_ADDR: :8081
    volumes:
      - ./anyns-hnsd-config.json:/etc/anyns/config.json:ro
    depends_on:
      - hnsd
    networks:
      dnsnet:
        aliases:
          - anyns-plugin-runtime

  pdns-recursor:
    build:
      context: ../../configs/pdns-recursor
    image: anyns/pdns-recursor:5.4.2
    command: ["--config-dir=/etc/powerdns"]
    environment:
      ANYNS_RUNTIME_ENDPOINT: http://anyns-plugin-runtime:8081/api/v1/resolve
      ANYNS_CLIENT_VIEW: default
      ANYNS_TENANT: default
      ANYNS_POLICY_TAGS: hnsd-integration
    volumes:
      - ../../configs/pdns-recursor:/etc/powerdns:ro
    depends_on:
      - anyns-plugin-runtime
    networks:
      dnsnet:
        aliases:
          - pdns-recursor

  bind-latest:
    image: ${BIND_IMAGE:-internetsystemsconsortium/bind9:9.20}
    entrypoint: ["/bin/sh", "/etc/bind/entrypoint.sh"]
    command: ["-g"]
    volumes:
      - ./bind/entrypoint.sh:/etc/bind/entrypoint.sh:ro
      - ./bind/named.conf:/etc/bind/named.conf.template:ro
      - bind-test-certs:/etc/bind/certs:ro
    depends_on:
      bind-certgen:
        condition: service_completed_successfully
      pdns-recursor:
        condition: service_started
    networks:
      dnsnet:
        aliases:
          - bind-latest

  hnsd:
    image: ${HNSD_IMAGE:-bcrd/handshake-hnsd:latest}
    networks:
      dnsnet:
        aliases:
          - hnsd

  dns-tools:
    build:
      context: ./dns-tools
    image: anyns/dns-tools:hnsd-integration
    command: ["sleep", "infinity"]
    volumes:
      - bind-test-certs:/certs:ro
    depends_on:
      bind-latest:
        condition: service_started
    networks:
      - dnsnet

networks:
  dnsnet:
    driver: bridge

volumes:
  bind-test-certs:
