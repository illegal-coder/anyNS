name: anyns-dns-integration

services:
  bind-certgen:
    build:
      context: ./certgen
    image: anyns/bind-certgen:integration
    volumes:
      - bind-test-certs:/certs
    networks:
      - dnsnet

  anyns-plugin-runtime:
    build:
      context: ../..
    image: anyns/runtime:integration
    environment:
      ANYNS_CONFIG_FILE: /etc/anyns/config.json
      ANYNS_RUNTIME_ADDR: :8081
      ANYNS_ADMIN_ADDR: :8080
      ANYNS_LOG_FORWARDER_ADDR: :8082
    volumes:
      - ./anyns-config.json:/etc/anyns/config.json:ro
    depends_on:
      - backend-fixtures
    networks:
      dnsnet:
        aliases:
          - anyns-plugin-runtime

  anyns-admin-api:
    image: anyns/runtime:integration
    entrypoint: ["/usr/local/bin/anyns-admin-api"]
    environment:
      ANYNS_CONFIG_FILE: /etc/anyns/config.json
      ANYNS_ADMIN_ADDR: :8080
      ANYNS_RUNTIME_ADDR: :8081
      ANYNS_LOG_FORWARDER_ADDR: :8082
    volumes:
      - ./anyns-config.json:/etc/anyns/config.json:ro
    depends_on:
      - anyns-plugin-runtime
    networks:
      dnsnet:
        aliases:
          - anyns-admin-api

  anyns-log-forwarder:
    image: anyns/runtime:integration
    entrypoint: ["/usr/local/bin/anyns-log-forwarder"]
    environment:
      ANYNS_CONFIG_FILE: /etc/anyns/config.json
      ANYNS_ADMIN_ADDR: :8080
      ANYNS_RUNTIME_ADDR: :8081
      ANYNS_LOG_FORWARDER_ADDR: :8082
    volumes:
      - ./anyns-config.json:/etc/anyns/config.json:ro
    depends_on:
      - backend-fixtures
    networks:
      dnsnet:
        aliases:
          - anyns-log-forwarder

  backend-fixtures:
    image: python:3.12-alpine
    command: ["python", "/fixtures/backend-fixtures.py"]
    volumes:
      - ./fixtures:/fixtures:ro
    networks:
      dnsnet:
        aliases:
          - backend-fixtures

  pdns-authoritative:
    image: powerdns/pdns-auth-50:5.0.5
    command:
      [
        "--config-dir=/etc/powerdns",
        "--api-key=docker-integration",
        "--webserver-password=docker-integration",
      ]
    volumes:
      - ./pdns-authoritative-bind.conf:/etc/powerdns/pdns.conf:ro
      - ../../configs/pdns-authoritative/named.conf:/etc/powerdns/named.conf:ro
      - ../../configs/pdns-authoritative/zones:/etc/powerdns/zones:ro
    networks:
      dnsnet:
        aliases:
          - pdns-authoritative

  pdns-recursor:
    build:
      context: ../../configs/pdns-recursor
    image: anyns/pdns-recursor:5.4.2
    command: ["--config-dir=/etc/powerdns"]
    environment:
      ANYNS_RUNTIME_ENDPOINT: http://anyns-plugin-runtime:8081/api/v1/resolve
      ANYNS_CLIENT_VIEW: default
      ANYNS_TENANT: default
      ANYNS_POLICY_TAGS: docker-integration
    volumes:
      - ../../configs/pdns-recursor:/etc/powerdns:ro
    depends_on:
      anyns-plugin-runtime:
        condition: service_started
      pdns-authoritative:
        condition: service_started
    networks:
      dnsnet:
        aliases:
          - pdns-recursor

  bind-latest:
    image: ${BIND_IMAGE:-internetsystemsconsortium/bind9:9.20}
    entrypoint: ["/bin/sh", "/etc/bind/entrypoint.sh"]
    command: ["-g"]
    volumes:
      - ./bind/entrypoint.sh:/etc/bind/entrypoint.sh:ro
      - ./bind/named.conf:/etc/bind/named.conf.template:ro
      - bind-test-certs:/etc/bind/certs:ro
    depends_on:
      bind-certgen:
        condition: service_completed_successfully
      pdns-recursor:
        condition: service_started
    networks:
      dnsnet:
        aliases:
          - bind-latest

  dns-tools:
    build:
      context: ./dns-tools
    image: anyns/dns-tools:integration
    command: ["sleep", "infinity"]
    volumes:
      - bind-test-certs:/certs:ro
    depends_on:
      bind-latest:
        condition: service_started
    networks:
      - dnsnet

networks:
  dnsnet:
    driver: bridge

volumes:
  bind-test-certs:
