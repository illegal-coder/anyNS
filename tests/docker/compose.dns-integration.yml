name: anyns-dns-integration

services:
  anyns-plugin-runtime:
    build:
      context: ../..
    image: anyns/runtime:integration
    environment:
      ANYNS_CONFIG_FILE: /etc/anyns/config.json
      ANYNS_RUNTIME_ADDR: :8081
      ANYNS_ADMIN_ADDR: :8080
      ANYNS_LOG_FORWARDER_ADDR: :8082
    volumes:
      - ./anyns-config.json:/etc/anyns/config.json:ro
    depends_on:
      - backend-fixtures
    networks:
      dnsnet:
        aliases:
          - anyns-plugin-runtime

  anyns-admin-api:
    image: anyns/runtime:integration
    entrypoint: ["/usr/local/bin/anyns-admin-api"]
    environment:
      ANYNS_CONFIG_FILE: /etc/anyns/config.json
      ANYNS_ADMIN_ADDR: :8080
      ANYNS_RUNTIME_ADDR: :8081
      ANYNS_LOG_FORWARDER_ADDR: :8082
    volumes:
      - ./anyns-config.json:/etc/anyns/config.json:ro
    depends_on:
      - anyns-plugin-runtime
    networks:
      dnsnet:
        aliases:
          - anyns-admin-api

  anyns-log-forwarder:
    image: anyns/runtime:integration
    entrypoint: ["/usr/local/bin/anyns-log-forwarder"]
    environment:
      ANYNS_CONFIG_FILE: /etc/anyns/config.json
      ANYNS_ADMIN_ADDR: :8080
      ANYNS_RUNTIME_ADDR: :8081
      ANYNS_LOG_FORWARDER_ADDR: :8082
    volumes:
      - ./anyns-config.json:/etc/anyns/config.json:ro
    depends_on:
      - backend-fixtures
    networks:
      dnsnet:
        aliases:
          - anyns-log-forwarder

  backend-fixtures:
    image: python:3.12-alpine
    command: ["python", "/fixtures/backend-fixtures.py"]
    volumes:
      - ./fixtures:/fixtures:ro
    networks:
      dnsnet:
        aliases:
          - backend-fixtures

  pdns-recursor:
    image: powerdns/pdns-recursor-51:5.1.3
    command: ["--config-dir=/etc/powerdns"]
    environment:
      ANYNS_RUNTIME_ENDPOINT: http://anyns-plugin-runtime:8081/api/v1/resolve
      ANYNS_CLIENT_VIEW: default
      ANYNS_TENANT: default
      ANYNS_POLICY_TAGS: docker-integration
    volumes:
      - ../../configs/pdns-recursor:/etc/powerdns:ro
    depends_on:
      - anyns-plugin-runtime
    networks:
      dnsnet:
        aliases:
          - pdns-recursor

  bind-latest:
    image: ${BIND_IMAGE:-internetsystemsconsortium/bind9:9.20}
    command: ["-g", "-c", "/etc/bind/named.conf"]
    volumes:
      - ./bind/named.conf:/etc/bind/named.conf:ro
    depends_on:
      - pdns-recursor
    networks:
      dnsnet:
        aliases:
          - bind-latest

  dns-tools:
    image: alpine:3.20
    command: ["sleep", "infinity"]
    depends_on:
      - bind-latest
    networks:
      - dnsnet

networks:
  dnsnet:
    driver: bridge
