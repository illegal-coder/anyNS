services:
  anyns-admin-api:
    environment:
      ANYNS_CERTIFICATES_ENABLED: "true"
      ANYNS_CERTIFICATE_ISSUER_MODE: private-ca
      ANYNS_CERTIFICATE_STORAGE_DIR: /var/lib/anyns/certificates
      ANYNS_PRIVATE_CA_CRL_DISTRIBUTION_URL: http://anyns-admin-api:8080/private-ca.crl
      ANYNS_ACME_MAX_ATTEMPTS: "1"
      ANYNS_ACME_REQUEST_TIMEOUT_SECONDS: "30"
    ports:
      - "127.0.0.1:${ANYNS_HNS_PRIVATE_CA_DEMO_ADMIN_PORT:-28110}:8080/tcp"
    volumes:
      - hns-private-ca-demo-admin-data:/var/lib/anyns

  pdns-recursor:
    command: ["--config-dir=/etc/pdns-recursor", "--enable-old-settings=yes"]
    volumes:
      - ./pdns-recursor-hns-private-ca-demo.conf:/etc/pdns-recursor/recursor.conf:ro

  hns-private-ca-origin:
    image: anyns/dns-tools:integration
    entrypoint: ["/bin/sh", "-euc"]
    command:
      - |
        while :; do
          cert="$$(find /var/lib/anyns/certificates/certs -mindepth 2 -maxdepth 2 -name fullchain.pem 2>/dev/null | head -n 1 || true)"
          if [ -n "$$cert" ]; then
            key="$${cert%/fullchain.pem}/private-key.pem"
            if [ -s "$$key" ]; then
              exec openssl s_server -accept 8443 -cert "$$cert" -key "$$key" -www
            fi
          fi
          sleep 1
        done
    volumes:
      - hns-private-ca-demo-admin-data:/var/lib/anyns:ro
    networks:
      dnsnet:
        aliases:
          - hns-private-ca-origin

volumes:
  hns-private-ca-demo-admin-data:
