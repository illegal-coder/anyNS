name: anyns-private-ca-certificates

services:
  admin:
    build:
      context: ${ANYNS_ADMIN_BUILD_CONTEXT:-../..}
    image: anyns/private-ca-certificates:integration
    entrypoint: ["/usr/local/bin/anyns-admin-api"]
    environment:
      ANYNS_CONFIG_FILE: /etc/anyns/config.json
      ANYNS_ADMIN_UI_DIR: /usr/share/anyns-admin
    ports:
      - "127.0.0.1:${ANYNS_PRIVATE_CA_ADMIN_PORT:-28090}:8080/tcp"
    volumes:
      - ${ANYNS_PRIVATE_CA_CONFIG_PATH:-./anyns-private-ca-config.json}:/etc/anyns/config.json:ro
      - private-ca-admin-data:/var/lib/anyns

volumes:
  private-ca-admin-data:
